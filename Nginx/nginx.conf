worker_processes auto;

events {
     worker_connections 768; 
     }

http {

    client_max_body_size 15M;

    upstream blue_server {
        server spring-app-blue:8081;
    }

    upstream green_server {
        server spring-app-green:8082;
    }

    server {
        listen 80;
        server_name j13a602.p.ssafy.io;

        location / {
            proxy_pass http://blue_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /test/ {
            proxy_pass http://green_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # location /swagger-ui/ {
        #     proxy_pass http://green_server/swagger-ui/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        # location /v3/api-docs/ {
        #     proxy_pass http://green_server/v3/api-docs/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        location /fastapi/ {
            proxy_pass http://fastapi-app:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
