<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>3D Viewer (WebView)</title>
    <style>
        html,body{height:100%;margin:0;background:#c8c8c8;overflow:hidden}
        #loading{position:absolute;inset:0;margin:auto;width:60px;height:60px;
          border:8px solid #f3f3f3;border-top:8px solid #0CAEC2;border-radius:50%;
          animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="loading"></div>

<script type="module">
    import * as THREE from './lib/three.module.js';
    import { OrbitControls } from './lib/OrbitControls.js';
    import { GLTFLoader } from './lib/GLTFLoader.js';

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    document.body.style.margin = 0;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(2,1.5,3);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5,10,7);
    scene.add(dir);

    const loader = new GLTFLoader();
    loader.load('../models/avatar.glb', (gltf) => {
      scene.add(gltf.scene);
      document.getElementById('loading').style.display = 'none';
    }, undefined, (e) => {
      console.error('GLB 로드 실패:', e);
    });

    function resize(){
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize);
    resize();

    new OrbitControls(camera, renderer.domElement);

    (function animate(){
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    })();
</script>
</body>
</html>
