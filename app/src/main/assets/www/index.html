<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>3D Avatar</title>
  <style>
    html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:transparent;position:relative}
    #container{position:relative;width:100%;height:100%;min-height:480px;
               outline:4px solid magenta !important;z-index:1}
    #c{display:block;width:100%;height:100%;position:relative;z-index:2;
       transform:translateZ(0);will-change:transform;backface-visibility:hidden;
       outline:4px solid lime !important}
    #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;
      border:8px solid #f3f3f3;border-top:8px solid #0CAEC2;border-radius:50%;
      animation:spin 1s linear infinite;z-index:1000}
    @keyframes spin{to{transform:rotate(360deg)}}
    #hud{position:absolute;left:12px;bottom:12px;color:#d8dee9;font:12px/1.6 ui-monospace,monospace;opacity:.9;z-index:1001;pointer-events:none}
    #hud b{color:#0CAEC2}
    #hud button{margin-left:6px;pointer-events:auto}
  </style>
</head>
<body>
<div id="container">
<canvas id="c"></canvas>
</div>
<!-- 디버그: 가림 요소 확인용 -->
<div id="debugTop" style="position:fixed; inset:0; pointer-events:none; z-index:99999; border:8px dashed red; mix-blend-mode:difference;"></div>
<!-- 디버그: JavaScript 실행 확인용 -->
<div id="debugJS" style="position:fixed; top:10px; left:10px; background:yellow; color:black; padding:5px; z-index:100000; font-size:12px;">JS Loading...</div>
<div id="loading"></div>
<div id="hud">
  <div>Mode: <b id="mode">EMBEDDED</b> | Queue: <b id="qsz">0</b> | FPS: <b id="fps">30</b></div>
  <div>
    <button id="play">Play</button>
    <button id="pause">Pause</button>
    <button id="speed24">24fps</button>
    <button id="speed30">30fps</button>
    <button id="openL">Open L</button>
    <button id="openR">Open R</button>
    <button id="fistL">Fist L</button>
    <button id="fistR">Fist R</button>
  </div>
</div>

<!-- ★ import map: 'three'를 로컬 파일로 매핑 -->
<script type="importmap">
{
  "imports": {
    "three": "./lib/three.module.js",
    "three/examples/jsm/loaders/GLTFLoader.js": "./lib/GLTFLoader.js",
    "three/examples/jsm/controls/OrbitControls.js": "./lib/OrbitControls.js",
    "three/examples/jsm/utils/BufferGeometryUtils.js": "./utils/BufferGeometryUtils.js"
  }
}
</script>

<!-- 앱 엔트리 -->
<script type="module" src="./app.js"></script>
</body>
</html>
