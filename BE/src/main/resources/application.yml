spring:
  application:
    name: sugyo
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # AWS S3 Configuration
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION}
      s3:
        bucket: ${SPRING_CLOUD_AWS_S3_BUCKET}
        cdn-url: ${SPRING_CLOUD_AWS_S3_CDN_URL}

  jwt:
    access-token-validity-in-ms: 3600000 #1시간
    refresh-token-validity-in-ms: 604800000 #7일
    secret: ${SPRING_JWT_SECRET}

cors:
  allowed-origins:

# SWAGGER CONFIG
server:
  forward-headers-strategy: framework
swagger:
  server-url: ${SWAGGER_SERVER_URL}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    url: /v3/api-docs

logging:
  level:
    root: INFO
    com.sugyo: DEBUG

server.port: ${SERVER_PORT:8080}

fastapi:
  server-url: ${AI_SERVER_URL}
